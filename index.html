<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Haven Desktop Engine</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #05050a; color: #f0f0f5;
            margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden;
        }
        
        /* Navigation Sidebar Panel */
        .sidebar {
            width: 260px; background-color: #0b0b12; border-right: 1px solid #1c1c2d;
            display: flex; flex-direction: column; padding: 25px 20px; z-index: 10;
            pointer-events: auto;
        }
        .sidebar h2 {
            font-size: 1.1rem; margin-top: 0; margin-bottom: 30px;
            text-transform: uppercase; letter-spacing: 1.5px; color: #7070ff;
            font-weight: 700; display: flex; align-items: center; gap: 8px;
        }
        .nav-btn {
            background: transparent; border: none; color: #7e7e96; text-align: left;
            padding: 14px 16px; margin-bottom: 8px; border-radius: 8px; font-size: 0.9rem;
            cursor: pointer; transition: all 0.2s ease-in-out; font-weight: 500;
        }
        .nav-btn:hover { background-color: #141424; color: #ffffff; }
        .nav-btn.active { background-color: #1a1a3a; color: #8a8aff; font-weight: 600; border-left: 3px solid #4d4dff; }
        
        .upload-btn {
            margin-top: auto; background: linear-gradient(135deg, #4d4dff, #8a8aff);
            color: white; border: none; padding: 12px; border-radius: 8px;
            cursor: pointer; font-weight: 600; font-size: 0.85rem; text-align: center;
            transition: opacity 0.2s; margin-bottom: 10px;
        }
        .upload-btn:hover { opacity: 0.9; }

        /* Transparent interaction wrapper */
        .main-content { 
            flex: 1; display: flex; flex-direction: column; padding: 40px; 
            overflow-y: auto; position: relative; z-index: 5;
            pointer-events: none; 
        }
        .main-content h1, .status-bar, .dashboard-grid, .wallpaper-grid { 
            pointer-events: auto; 
        }
        .main-content h1 { margin-top: 0; font-size: 2rem; margin-bottom: 6px; letter-spacing: -0.5px; }
        .status-bar { font-size: 0.85rem; color: #52527a; margin-bottom: 35px; font-family: monospace; }
        
        /* Grid layouts and cards */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 10px; }
        .dashboard-card { background: #0b0b12; border: 1px solid #1c1c2d; border-radius: 12px; padding: 24px; }
        
        /* Account & File submission cards styling */
        .auth-card { background: #0b0b12; border: 1px solid #1c1c2d; border-radius: 12px; padding: 24px; max-width: 480px; margin-bottom: 20px; }
        .auth-input { width: 100%; background-color: #12121f; border: 1px solid #1c1c2d; color: #fff; padding: 12px 16px; border-radius: 8px; font-size: 0.95rem; margin-bottom: 12px; outline: none; }
        .auth-input:focus { border-color: #4d4dff; }
        .action-btn { background-color: #4d4dff; color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-right: 10px; transition: opacity 0.2s; }
        .action-btn:hover { opacity: 0.9; }
        .error-msg { font-size: 0.85rem; margin-top: 12px; min-height: 18px; line-height: 1.4; }

        .wallpaper-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }
        .card { background: #0b0b12; border: 1px solid #1c1c2d; border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.2s ease, border-color 0.2s ease; }
        .card:hover { transform: translateY(-5px); border-color: #4d4dff; }
        
        /* Card Preview Frame */
        .card-preview { width: 100%; height: 140px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #030307; }
        .card-info { padding: 16px; font-size: 0.85rem; text-align: left; background: #0e0e17; border-top: 1px solid #1c1c2d; }
        
        /* Engine Background Placement Layers */
        #bg-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: auto; }
        .bg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; object-fit: cover; display: none; }
        #image-layer { background-size: cover; background-position: center; background-repeat: no-repeat; }
        #canvas-runtime { background: #040408; position: absolute; top:0; left:0; width:100%; height:100%; }

        .ui-wrapper { position: relative; z-index: 2; display: flex; width: 100%; height: 100%; background: rgba(5, 5, 10, 0.25); pointer-events: none; }
        
        .hud-toggle {
            position: absolute; bottom: 25px; right: 25px; background: #0b0b12; color: #8a8aff;
            border: 1px solid #1c1c2d; padding: 12px 20px; border-radius: 8px; cursor: pointer;
            z-index: 100; pointer-events: auto; font-size: 0.85rem; font-weight: 600; transition: all 0.2s;
        }
        .hud-toggle:hover { background: #141424; color: #fff; border-color: #4d4dff; }

        .preview-svg { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="bg-container">
        <div id="image-layer" class="bg-layer"></div>
        <canvas id="canvas-runtime" class="bg-layer"></canvas>
        <iframe id="iframe-layer" class="bg-layer"></iframe>
    </div>

    <button class="hud-toggle" onclick="toggleInterface()">Toggle Engine Overlay</button>

    <div class="ui-wrapper" id="ui-panel">
        <div class="sidebar">
            <h2><span>❖</span> Haven Desktop</h2>
            <button class="nav-btn active" id="btn-home" onclick="switchCategory('home')">🏠 Home Dashboard</button>
            <button class="nav-btn" id="btn-static" onclick="switchCategory('static')">🌌 Image Systems</button>
            <button class="nav-btn" id="btn-live" onclick="switchCategory('live')">🎬 Live Wallpapers</button>
            <button class="nav-btn" id="btn-interactive" onclick="switchCategory('interactive')">🎮 Interactive</button>
            
            <input type="file" id="file-uploader" accept="image/*" style="display:none" onchange="handleUserUpload(this)">
            <button class="upload-btn" onclick="document.getElementById('file-uploader').click()">✦ Upload Wallpaper</button>
        </div>

        <div class="main-content">
            <h1 id="category-title">System Active</h1>
            <div class="status-bar" id="status-text">Engine Environment Safe</div>
            <div id="content-area"></div>
        </div>
    </div>

    <script>
        const fs = require('fs');
        const path = require('path');
        const os = require('os');
        const { exec } = require('child_process');

        const nativeDir = window.__dirname || process.cwd();
        const localBasePath = path.join(nativeDir, "haven-desktop-wallpapers", "approved") + path.sep;
        const databasePath = path.join(nativeDir, "collection_store.json");
        
        let activeWallpaperName = "Anime Wall Prints";
        let activeWallpaperType = "image";
        let activeFile = "synthwave.jpg";
        let runtimeLoopId = null;
        let activeTab = 'home';

        // Global context to track auth sessions between tab switches
        window.currentUser = null;

        let wallpaperCollection = {
            static: [
                { name: "Anime Wall Prints", file: "synthwave.jpg", type: "image" },
                { name: "Nordic Aurora Sky", file: "aurora.jpg", type: "image" },
                { name: "Minimalist Mountains", file: "mountains.jpg", type: "image" }
            ],
            live: [
                { 
                    name: "Matrix Digital Rain", 
                    type: "procedural-matrix",
                    preview: `<svg class="preview-svg" viewBox="0 0 240 140" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="#05050a"/><text x="20" y="30" fill="#00ff66" font-family="monospace" font-size="12">1 0 1</text><text x="20" y="60" fill="#00ff66" font-family="monospace" font-size="12" opacity="0.6">0</text><text x="70" y="40" fill="#00ff66" font-family="monospace" font-size="12">0 1</text><text x="70" y="70" fill="#00ff66" font-family="monospace" font-size="12" opacity="0.4">1</text><text x="140" y="50" fill="#00ff66" font-family="monospace" font-size="12">1</text><text x="180" y="20" fill="#00ff66" font-family="monospace" font-size="12">0</text><text x="180" y="50" fill="#00ff66" font-family="monospace" font-size="12" opacity="0.7">1</text></svg>`
                },
                { 
                    name: "Cozy Lofi Rain", 
                    type: "procedural-rain",
                    preview: `<svg class="preview-svg" viewBox="0 0 240 140" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="#0c0e14"/><line x1="30" y1="20" x2="25" y2="45" stroke="#4d6280" stroke-width="1.5"/><line x1="90" y1="10" x2="85" y2="35" stroke="#4d6280" stroke-width="1.5"/><line x1="60" y1="70" x2="55" y2="95" stroke="#4d6280" stroke-width="1.5"/><line x1="150" y1="40" x2="145" y2="65" stroke="#4d6280" stroke-width="1.5"/><line x1="200" y1="80" x2="195" y2="105" stroke="#4d6280" stroke-width="1.5"/></svg>`
                }
            ],
            interactive: [
                { 
                    name: "Particle Sandbox", 
                    file: "particles.html", 
                    type: "html",
                    preview: `<svg class="preview-svg" viewBox="0 0 240 140" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="#06040a"/><circle cx="120" cy="70" r="5" fill="#e0b0ff" opacity="0.9"/><line x1="120" y1="70" x2="100" y2="40" stroke="#b666d2" stroke-width="2" stroke-dasharray="2,3"/><line x1="120" y1="70" x2="145" y2="45" stroke="#b666d2" stroke-width="1.5" stroke-dasharray="1,4"/><line x1="120" y1="70" x2="150" y2="95" stroke="#a34bc4" stroke-width="2" stroke-dasharray="2,2"/><line x1="120" y1="70" x2="85" y2="85" stroke="#a34bc4" stroke-width="1.5" stroke-dasharray="3,3"/><line x1="120" y1="70" x2="125" y2="115" stroke="#8833a5" stroke-width="2" stroke-dasharray="1,3"/><circle cx="95" cy="35" r="2.5" fill="#df9eff"/><circle cx="152" cy="40" r="2" fill="#f3d5ff"/><circle cx="158" cy="102" r="3" fill="#df9eff"/><circle cx="78" cy="88" r="2" fill="#c37be0"/><circle cx="126" cy="122" r="2.5" fill="#9d4ec4"/></svg>`
                },
                { 
                    name: "Neon Wave Pulse", 
                    file: "neon_waves.html", 
                    type: "html",
                    preview: `<svg class="preview-svg" viewBox="0 0 240 140" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="#0b0114"/><path d="M0,70 Q60,20 120,70 T240,70" fill="none" stroke="#00ffff" stroke-width="2"/></svg>`
                }
            ]
        };

        function loadSavedCollection() {
            if (fs.existsSync(databasePath)) {
                try {
                    const data = fs.readFileSync(databasePath, 'utf8');
                    const parsed = JSON.parse(data);
                    if (parsed.static) wallpaperCollection.static = parsed.static;
                } catch(e) {
                    console.error("Could not parse collection store:", e);
                }
            }
        }

        function saveCollectionToDisk() {
            try {
                fs.writeFileSync(databasePath, JSON.stringify(wallpaperCollection, null, 2), 'utf8');
            } catch(e) {
                console.error("Error writing collection storage:", e);
            }
        }

        function toggleInterface() {
            const panel = document.getElementById('ui-panel');
            panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
        }

        function handleUserUpload(element) {
            if(!element.files || element.files.length === 0) return;
            const chosenFile = element.files[0];
            const sanitizedName = chosenFile.name.replace(/\s+/g, '_');
            const targetDestination = path.join(localBasePath, sanitizedName);
            
            try {
                if(!fs.existsSync(localBasePath)) {
                    fs.mkdirSync(localBasePath, { recursive: true });
                }
                fs.copyFileSync(chosenFile.path, targetDestination);
                let simpleTitle = chosenFile.name.split('.')[0].replace(/[_-]/g, ' ');
                simpleTitle = simpleTitle.charAt(0).toUpperCase() + simpleTitle.slice(1);

                wallpaperCollection.static.push({
                    name: simpleTitle,
                    file: sanitizedName,
                    type: "image"
                });

                saveCollectionToDisk();
                alert(`Successfully added "${simpleTitle}" to your permanent library!`);
                if(activeTab === 'static') loadWallpapers('static');
            } catch(err) {
                alert("Failed to write image: " + err.message);
            }
        }

        function engageProceduralEngine(mode) {
            const canvas = document.getElementById('canvas-runtime');
            const ctx = canvas.getContext('2d');
            canvas.style.display = 'block';
            if(runtimeLoopId) cancelAnimationFrame(runtimeLoopId);
            
            function syncSize() {
                if(canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }
            }
            window.addEventListener('resize', syncSize);
            syncSize();

            let matrixColumns = Math.floor(window.innerWidth / 15) + 1;
            let matrixDrops = Array(matrixColumns).fill(1);

            function draw() {
                if (mode === 'procedural-matrix') {
                    ctx.fillStyle = 'rgba(5, 5, 10, 0.07)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#00ff66';
                    ctx.font = '14px monospace';
                    for(let i = 0; i < matrixDrops.length; i++) {
                        let textChar = String.fromCharCode(33 + Math.floor(Math.random() * 93));
                        ctx.fillText(textChar, i * 15, matrixDrops[i] * 15);
                        if(matrixDrops[i] * 15 > canvas.height && Math.random() > 0.975) matrixDrops[i] = 0;
                        matrixDrops[i]++;
                    }
                } else if (mode === 'procedural-rain') {
                    ctx.fillStyle = 'rgba(12, 14, 20, 0.25)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.strokeStyle = 'rgba(150,180,220,0.35)';
                    ctx.lineWidth = 1.5;
                    for(let i=0; i<20; i++) {
                        let rainX = Math.random() * canvas.width;
                        let rainY = Math.random() * canvas.height;
                        ctx.beginPath();
                        ctx.moveTo(rainX, rainY);
                        ctx.lineTo(rainX - 3, rainY + 22);
                        ctx.stroke();
                    }
                }
                runtimeLoopId = requestAnimationFrame(draw);
            }
            draw();
        }

        function executeNativeSystemShift(filePath) {
            const systemPlatform = process.platform; 
            if (systemPlatform === 'win32') {
                const winPowerShellCmd = `powershell -command "Add-Type -TypeDefinition 'using System; using System.Runtime.InteropServices; public class Wallpaper { [DllImport(\\"user32.dll\\")] public static extern int SystemParametersInfo(int uAction, int uParam, string lpvParam, int fuWinIni); }'; [Wallpaper]::SystemParametersInfo(20, 0, '${filePath}', 3)"`;
                exec(winPowerShellCmd);
            } else if (systemPlatform === 'darwin') {
                const macAppleScriptCmd = `osascript -e 'tell application "Finder" to set desktop picture to POSIX file "${filePath}"'`;
                exec(macAppleScriptCmd);
            } else if (systemPlatform === 'linux') {
                const gnomeCmd = `gsettings set org.gnome.desktop.background picture-uri "file://${filePath}" && gsettings set org.gnome.desktop.background picture-uri-dark "file://${filePath}"`;
                exec(gnomeCmd, (err) => {
                    if(err) {
                        try {
                            const sharedTarget = path.join(os.homedir(), "my_active_wallpaper.jpg");
                            fs.copyFileSync(filePath, sharedTarget);
                        } catch(e) { console.log("File mapping stream isolated:", e); }
                    }
                });
            }
        }

        function applyWallpaper(url, name, type) {
            activeWallpaperName = name;
            activeWallpaperType = type;
            document.getElementById('image-layer').style.display = 'none';
            document.getElementById('canvas-runtime').style.display = 'none';
            document.getElementById('iframe-layer').style.display = 'none';
            if(runtimeLoopId) { cancelAnimationFrame(runtimeLoopId); runtimeLoopId = null; }

            const timestamp = new Date().getTime();
            if(type === 'image') {
                const imgLayer = document.getElementById('image-layer');
                imgLayer.style.backgroundImage = `url('file://${url}?t=${timestamp}')`;
                imgLayer.style.display = 'block';
                executeNativeSystemShift(url);
            } else if(type.startsWith('procedural-')) {
                engageProceduralEngine(type);
            } else if(type === 'html') {
                const frame = document.getElementById('iframe-layer');
                frame.src = "file://" + url + "?t=" + timestamp;
                frame.style.display = 'block';
            }
            document.getElementById('status-text').innerText = `Active Profile: ${name}`;
            if(activeTab === 'home') showDashboard();
        }

        // Updated dynamically populated dashboard view handler
        function showDashboard() {
            const contentArea = document.getElementById('content-area');
            
            let authSectionHTML = '';
            if (!window.currentUser) {
                // Render Secure Login Form Panel
                authSectionHTML = `
                    <div class="auth-card">
                        <h3 style="margin-top:0; margin-bottom:20px; color:#fff;">Global Cloud Account</h3>
                        <div id="auth-logged-out">
                            <input type="email" id="auth-email" class="auth-input" placeholder="Email Address" />
                            <div style="position: relative; width: 100%;">
                                <input type="password" id="auth-password" class="auth-input" placeholder="Password" style="padding-right: 40px;" />
                                <button type="button" id="btn-toggle-password" style="position: absolute; right: 14px; top: 38%; transform: translateY(-50%); background: none; border: none; color: #7e7e96; cursor: pointer; font-size: 1rem; padding: 0;">👁️</button>
                            </div>
                            <div style="margin-top: 5px;">
                                <button id="btn-login" class="action-btn">Login</button>
                                <button id="btn-signup" class="action-btn" style="background: transparent; border: 1px solid #1c1c2d;">Sign Up</button>
                            </div>
                            <div style="margin-top:15px;">
                                <a href="#" id="link-forgot-password" style="color: #7070ff; font-size: 0.85rem; text-decoration: none;">Forgot Password?</a>
                            </div>
                        </div>
                        <div id="auth-error-status" class="error-msg" style="color: #ff4a4a;"></div>
                    </div>
                `;
            } else {
                // Render Active Account Settings Panel + Local File Explorer Submission Card
                authSectionHTML = `
                    <div class="auth-card">
                        <h3 style="margin-top:0; margin-bottom:20px; color:#fff;">Global Cloud Account</h3>
                        <div id="auth-logged-in">
                            <p style="font-size: 0.95rem; margin-bottom: 15px;">Logged in as: <span id="user-display-email" style="font-weight:bold; color:#7070ff;">${window.currentUser.email}</span></p>
                            
                            <div style="border-top: 1px solid #1c1c2d; margin-top: 20px; padding-top: 15px;">
                                <h4 style="margin: 0 0 12px 0; color: #fff; font-size:0.95rem;">Account Settings</h4>
                                <input type="password" id="settings-new-password" class="auth-input" placeholder="New Password" style="margin-bottom: 12px;" />
                                <button id="btn-change-password" class="action-btn" style="padding: 8px 15px; font-size: 0.85rem; background-color: #1c1c2d; border: 1px solid #7070ff;">Update Password</button>
                                <button id="btn-delete-account" class="action-btn" style="padding: 8px 15px; font-size: 0.85rem; background-color: transparent; border: 1px solid #ff4a4a; color: #ff4a4a; margin-top: 10px;">Delete Account</button>
                            </div>
                            <button id="btn-logout" class="action-btn" style="background-color: #ff4a4a; margin-top: 25px; width: 100%; margin-right: 0;">Log Out</button>
                        </div>
                        <div id="auth-error-status" class="error-msg" style="color: #ff4a4a;"></div>
                    </div>

                    <div class="auth-card" style="max-width: 550px;">
                        <h3 style="margin-top: 0; margin-bottom: 10px; color: #fff;">Submit Wallpaper to Public Network</h3>
                        <p style="color: #7e7e96; font-size: 0.85rem; margin-bottom: 20px;">Select an asset file directly from your machine to sync with your account stream profile.</p>
                        
                        <input type="file" id="wallpaper-file-picker" accept="image/*" style="display: none;" />
                        <button id="btn-submit-wallpaper" class="action-btn" style="width: 100%; background: linear-gradient(135deg, #4d4dff, #8a8aff); margin-right: 0;">Browse Local Wallpaper</button>
                    </div>
                `;
            }

            contentArea.innerHTML = `
                <div class="dashboard-grid" style="grid-template-columns: 1fr; max-width: 800px; pointer-events: auto;">
                    <div class="dashboard-card" style="margin-bottom: 10px;">
                        <h3 style="margin-top:0; color:#8a8aff; font-size:1rem; text-transform:uppercase; letter-spacing:0.5px;">Active Engine Target</h3>
                        <div style="font-weight: 700; font-size:1.4rem; color: #fff; margin-top:10px;">${activeWallpaperName}</div>
                        <div style="color:#52527a; margin-top:8px; font-size:0.8rem; font-family:monospace;">System Sync Engine Operational</div>
                    </div>
                    ${authSectionHTML}
                </div>
            `;

            // Bind controller interactions to newly injected DOM elements
            if (window.initAuthController) {
                window.initAuthController();
            }
        }

        function loadWallpapers(category) {
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = `<div class="wallpaper-grid" id="wallpaper-grid"></div>`;
            const grid = document.getElementById('wallpaper-grid');

            const items = wallpaperCollection[category] || [];
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                let absolutePath = item.file ? localBasePath + item.file : '';
                card.onclick = () => applyWallpaper(absolutePath, item.name, item.type);
                
                let previewStyle = '';
                let previewInner = '';
                const timestamp = new Date().getTime();
                if(item.type === 'image') {
                    previewStyle = `background-image: url('file://${absolutePath}?t=${timestamp}'); background-size: cover; background-position: center;`;
                } else {
                    previewInner = item.preview;
                }
                
                card.innerHTML = `
                    <div class="card-preview" style="${previewStyle}">
                        ${previewInner}
                    </div>
                    <div class="card-info">
                        <strong style="display:block; color:#fff; margin-bottom:4px; font-size:0.9rem;">${item.name}</strong>
                        <span style="font-size:11px; color:#62628c; font-family:monospace; text-transform:uppercase;">${item.type} asset</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function switchCategory(category) {
            activeTab = category;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${category}`).classList.add('active');
            
            if (category === 'home') {
                showDashboard();
            } else {
                loadWallpapers(category);
            }
        }

        loadSavedCollection();
        applyWallpaper(localBasePath + activeFile, activeWallpaperName, activeWallpaperType);
        showDashboard();
    </script>
    <script src="./authController.js"></script>
</body>
</html>
